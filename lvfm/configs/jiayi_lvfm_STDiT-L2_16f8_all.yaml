globals:
  target_fps: 32
  target_nframes: 16
  outputs: ["video", "image"] #["video", "lvef", "image"]
  resolution: 256
  latent_res: 32
  latent_channels: 16  # VAE latent channels
  max_steps: 1000_000

max_train_steps: ${globals.max_steps}  # remenber change ref_steps blow 
gradient_accumulation_steps: 2
mixed_precision: "bf16" # "no", "fp16", "bf16"
use_ema: true
max_grad_norm: 1.0
max_grad_value: -1
sample_latents: true

# | Model | Layers N | Hidden size d | Heads | Gflops (I=32, p=4)  | Params |
# |-------|----------|---------------|-------|---------------------|--------|
# | DiT-S | 12       | 384           | 6     | 1.4                 | 36M    |
# | DiT-B | 12       | 768           | 12    | 5.6                 | 146M   |
# | DiT-L | 24       | 1024          | 16    | 19.7                | 512M   |
# | DiT-XL| 28       | 1152          | 16    | 29.1                | 755M   |
denoiser:
    target: echosyn.common.models.DiffuserSTDiT
    args: # DiT-L
        input_size: 
          - ${globals.target_nframes}
          - ${globals.latent_res}
          - ${globals.latent_res}
        in_channels: 32
        out_channels: ${globals.latent_channels}
        patch_size: [2, 2, 2]
        hidden_size: 1024
        depth: 24
        num_heads: 16
        mlp_ratio: 4.0
        class_dropout_prob: 0.0
        drop_path: 0.0
        no_temporal_pos_emb: false
        caption_channels: 768 # 0 = disabled
        model_max_length: 1 # 0 = disabled
        space_scale: 1.0
        time_scale: 1.0
        enable_flashattn: false

optimizer:
  target: torch.optim.AdamW
  args:
    lr: 2e-4
    betas: [0.9, 0.999]
    weight_decay: 1e-2
    eps: 1e-08

scheduler:
  target: echosyn.common.schedulers.StepBasedLearningRateScheduleWithWarmup
  args:
    warmup_steps: 2000
    ref_steps: 1000000
    eta_min: 1e-6
    decay_rate: 2.0

vae:
  target: diffusers.AutoencoderKL
  # pretrained: models/vae_4ch_f4
  # pretrained: models/vae_16ch_f8
  pretrained: /path/to/FLUX_vae_checkpoint

datasets:
    - name: LatentBlock
      active: true
      params:
        root_dir: ${LATTE_TRAIN_DATA_ROOT}
        embedding_dir: ${LATTE_EMBEDDING_ROOT}
        block_size: 16

val_datasets:
    - name: LatentBlock
      active: true
      params:
        root_dir: ${LATTE_VALID_DATA_ROOT}
        embedding_dir: ${LATTE_VALID_EMBEDDING_ROOT}
        block_size: 16

dataloader:
  target: torch.utils.data.DataLoader
  args:
    shuffle: true
    batch_size: 16  
    num_workers: 32 ##### changed
    pin_memory: true
    drop_last: true
    persistent_workers: true

noise_offset: 0.05
noise_cond_image: 0.05
no_conditionning: False
p_drop_conditionning: 0.0

output_dir: /path/to/experiments/${wandb_args.name}
logging_dir: logs

report_to: wandb
wandb_args:
  project: CTsyn
  name: lvfm_STDiT-L2_16f8_2_2_2_bsz16_v2_black_rate_0.3_v2
  group: lvfm
  id: lvfm_STDiT-L2_16f8_2_2_2_bsz16_v2_black_rate_0.3_v2

checkpointing_steps: 2_000 # ~3/hour
checkpoints_to_keep: [50000, 100000, 200000, 400000, 600000, 800000, 1000000]
resume_from_checkpoint: latest
if_fine_tuned: false

validation:
  samples: 4
  steps: 5_000
  timesteps: 25
  frames: ${globals.target_nframes}
  fps: ${globals.target_fps}
  #lvefs: [-1.0, 0.3, 0.6, 0.9]
  #cond_image_mask: [0, 1, 1, 1]

seed: 42
